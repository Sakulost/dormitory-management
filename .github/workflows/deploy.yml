name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

# 赋予写入权限
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 安装依赖
        run: npm install
        working-directory: dormitory-frontend

      - name: 构建项目
        run: npm run build
        working-directory: dormitory-frontend

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dormitory-frontend/dist
